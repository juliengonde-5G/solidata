server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # DNS Docker interne — re-résolution à chaque requête
    resolver 127.0.0.11 valid=10s;
    set $backend_upstream http://backend:5003;

    # Reverse proxy API vers le backend
    # $request_uri nécessaire car proxy_pass avec variable ne fait pas
    # la substitution d'URI automatique (contrairement aux littéraux)
    location /api/ {
        proxy_pass $backend_upstream$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Reverse proxy uploads vers le backend
    location /uploads/ {
        proxy_pass $backend_upstream$request_uri;
        proxy_set_header Host $host;
    }

    # Logo et assets statiques racine — pas de cache long
    location = /logo.png {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=3600";
    }

    # SPA routing - toutes les routes vers index.html
    location / {
        try_files $uri $uri/ /index.html;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' http://82.65.155.79:8083 http://localhost:5003; font-src 'self' data:;" always;
    }

    # Cache statique pour assets buildés (avec hash dans le nom)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Pas de cache pour index.html
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
