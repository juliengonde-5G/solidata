version: '3.8'

services:
  db:
    image: postgis/postgis:15-3.4-alpine
    restart: always
    environment:
      POSTGRES_DB: solidata
      POSTGRES_USER: solidata
      POSTGRES_PASSWORD: ${DB_PASSWORD:-solidata_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5003:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U solidata"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    environment:
      - DATABASE_URL=postgresql+asyncpg://solidata:${DB_PASSWORD:-solidata_dev}@db:5432/solidata
      - SECRET_KEY=${SECRET_KEY:-solidata-secret-key-change-in-production}
      - DEPOT_LAT=49.5008
      - DEPOT_LON=1.0506
    volumes:
      - upload_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "8083:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  upload_data:
